<!DOCTYPE html>
<html>
<head>
    <title>Employee Attrition Predictor</title>
</head>
<body>
    <h2>DSPristine - Employee Attrition Predictor</h2>
    <form action="/predict" method="post">
        <label>Age:</label><br>
        <input type="number" name="age" required><br><br>
        
        <label>Monthly Income ($):</label><br>
        <input type="number" name="monthly_income" required><br><br>
        
        <label>Distance From Home (km):</label><br>
        <input type="number" name="distance_from_home" required><br><br>
        
        <button type="submit">Predict Risk</button>
    </form>

    <h3>{{ prediction_text }}</h3>
</body>
</html>
